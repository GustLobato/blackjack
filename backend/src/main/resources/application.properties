# Porta do servidor (usamos 8081 porque a 8080 costuma estar ocupada)
server.port=8081

# ----- Conexao com o banco PostgreSQL -----
spring.datasource.url=jdbc:postgresql://localhost:5432/blackjack
spring.datasource.username=postgres
spring.datasource.password=159875321

# ----- JPA / Hibernate -----
# "update" faz o Hibernate criar/atualizar a tabela a partir da entidade
spring.jpa.hibernate.ddl-auto=update
# mostra no console o SQL que o Hibernate executa (bom para acompanhar)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
